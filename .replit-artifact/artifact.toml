kind = "web"
previewPath = "/"
title = "Project Proposal Template"
version = "1.0.0"
id = "artifacts/proposal-template"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19962

[services.development]
run = "pnpm --filter @workspace/proposal-template run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/proposal-template", "run", "build" ]
publicDir = "artifacts/proposal-template/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19962"
BASE_PATH = "/"
